name: Node.js CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_EMAILJS_SERVICE_ID: service_iq50ply
      NEXT_PUBLIC_EMAILJS_TEMPLATE_ID: template_4ltm9uh
      NEXT_PUBLIC_EMAILJS_PUBLIC_KEY: DOo_-w0czR8uQX_2N

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml
      - name: Installing Packages 🥁
        run: pnpm install --frozen-lockfile

      - name: Building 🧱
        run: pnpm run build
        # env:
        #   NEXT_PUBLIC_TRACKING_ID: G-8FBXBFXC10

      - name: Exporting Bundle Files 🎪
        run: pnpm run export
      - run: touch ./out/.nojekyll
